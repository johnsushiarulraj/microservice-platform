replicaCount: 2

image:
  repository: api-gateway
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8090

resources:
  requests:
    memory: "192Mi"
    cpu: "200m"
  limits:
    memory: "384Mi"
    cpu: "400m"

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70

env:
  SPRING_PROFILES_ACTIVE: local
