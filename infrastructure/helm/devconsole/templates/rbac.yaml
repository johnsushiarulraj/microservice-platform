apiVersion: v1
kind: ServiceAccount
metadata:
  name: devconsole
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: devconsole-admin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: devconsole
    namespace: {{ .Release.Namespace }}
