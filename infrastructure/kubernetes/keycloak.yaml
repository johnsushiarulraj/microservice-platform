apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm
  namespace: payments
data:
  realm.json: |
    {
      "realm": "template",
      "enabled": true,
      "clients": [
        {
          "clientId": "microservice-template",
          "enabled": true,
          "publicClient": false,
          "secret": "template-secret",
          "directAccessGrantsEnabled": true,
          "serviceAccountsEnabled": true
        }
      ],
      "roles": {
        "realm": [
          {"name": "TEMPLATE_USER"},
          {"name": "TEMPLATE_ADMIN"}
        ]
      },
      "users": [
        {
          "username": "testuser",
          "enabled": true,
          "credentials": [{"type": "password", "value": "password", "temporary": false}],
          "realmRoles": ["TEMPLATE_USER"]
        },
        {
          "username": "adminuser",
          "enabled": true,
          "credentials": [{"type": "password", "value": "password", "temporary": false}],
          "realmRoles": ["TEMPLATE_USER", "TEMPLATE_ADMIN"]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: keycloak
  namespace: payments
  labels:
    app: keycloak
spec:
  replicas: 1
  selector:
    matchLabels:
      app: keycloak
  template:
    metadata:
      labels:
        app: keycloak
    spec:
      containers:
        - name: keycloak
          image: quay.io/keycloak/keycloak:24.0
          args: ["start-dev", "--import-realm"]
          env:
            - name: KEYCLOAK_ADMIN
              value: admin
            - name: KEYCLOAK_ADMIN_PASSWORD
              value: admin
            - name: KC_HTTP_PORT
              value: "8080"
            - name: KC_HOSTNAME_STRICT
              value: "false"
            - name: KC_HOSTNAME_STRICT_HTTPS
              value: "false"
            - name: KC_HTTP_ENABLED
              value: "true"
            - name: KC_PROXY_HEADERS
              value: "xforwarded"
          ports:
            - name: http
              containerPort: 8080
            - name: management
              containerPort: 9000
          volumeMounts:
            - name: realm-config
              mountPath: /opt/keycloak/data/import
          resources:
            requests:
              memory: 512Mi
              cpu: 250m
            limits:
              memory: 1Gi
              cpu: 1000m
          readinessProbe:
            httpGet:
              path: /realms/template/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 15
          livenessProbe:
            httpGet:
              path: /realms/master/.well-known/openid-configuration
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 15
            failureThreshold: 8
      volumes:
        - name: realm-config
          configMap:
            name: keycloak-realm
---
apiVersion: v1
kind: Service
metadata:
  name: keycloak
  namespace: payments
spec:
  selector:
    app: keycloak
  ports:
    - name: http
      port: 8080
      targetPort: 8080
  type: ClusterIP
