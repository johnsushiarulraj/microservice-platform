apiVersion: batch/v1
kind: Job
metadata:
  name: localstack-init
  namespace: payments
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: amazon/aws-cli:2.13.0
          env:
            - name: AWS_ACCESS_KEY_ID
              value: "test"
            - name: AWS_SECRET_ACCESS_KEY
              value: "test"
            - name: AWS_DEFAULT_REGION
              value: "us-east-1"
            - name: AWS_ENDPOINT_URL
              value: "http://localstack.payments.svc.cluster.local:4566"
          command: ["/bin/sh", "-c"]
          args:
            - |
              echo "Waiting for LocalStack..."
              until aws --endpoint-url=$AWS_ENDPOINT_URL s3 ls; do
                sleep 2
              done
              echo "Creating S3 bucket..."
              aws --endpoint-url=$AWS_ENDPOINT_URL s3 mb s3://template-documents || true
              echo "Creating SQS queues..."
              aws --endpoint-url=$AWS_ENDPOINT_URL sqs create-queue --queue-name template-tasks || true
              aws --endpoint-url=$AWS_ENDPOINT_URL sqs create-queue --queue-name template-dlq || true
              echo "Creating DynamoDB table..."
              aws --endpoint-url=$AWS_ENDPOINT_URL dynamodb create-table \
                --table-name template-idempotency \
                --attribute-definitions AttributeName=eventId,AttributeType=S \
                --key-schema AttributeName=eventId,KeyType=HASH \
                --billing-mode PAY_PER_REQUEST || true
              echo "LocalStack init complete."
