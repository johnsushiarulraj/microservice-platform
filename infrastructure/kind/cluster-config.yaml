kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
name: template-local
nodes:
  - role: control-plane
    kubeadmConfigPatches:
      - |
        kind: InitConfiguration
        nodeRegistration:
          kubeletExtraArgs:
            node-labels: "ingress-ready=true"
    extraPortMappings:
      - containerPort: 80
        hostPort: 80
        protocol: TCP
      - containerPort: 443
        hostPort: 443
        protocol: TCP
    extraMounts:
      - hostPath: ./data/postgres
        containerPath: /data/postgres
      - hostPath: ./data/opensearch
        containerPath: /data/opensearch
      - hostPath: ./data/localstack
        containerPath: /data/localstack
      - hostPath: ./data/kafka
        containerPath: /data/kafka
      - hostPath: ./data/keycloak-db
        containerPath: /data/keycloak-db
  - role: worker
    extraMounts:
      - hostPath: ./data/postgres
        containerPath: /data/postgres
      - hostPath: ./data/opensearch
        containerPath: /data/opensearch
      - hostPath: ./data/localstack
        containerPath: /data/localstack
      - hostPath: ./data/kafka
        containerPath: /data/kafka
      - hostPath: ./data/keycloak-db
        containerPath: /data/keycloak-db
  - role: worker
    extraMounts:
      - hostPath: ./data/postgres
        containerPath: /data/postgres
      - hostPath: ./data/opensearch
        containerPath: /data/opensearch
      - hostPath: ./data/localstack
        containerPath: /data/localstack
      - hostPath: ./data/kafka
        containerPath: /data/kafka
      - hostPath: ./data/keycloak-db
        containerPath: /data/keycloak-db
