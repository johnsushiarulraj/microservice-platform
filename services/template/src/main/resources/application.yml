spring:
  application:
    name: microservice-template
  profiles:
    active: local
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
  redis:
    timeout: 2000ms
  cloud:
    stream:
      kafka:
        binder:
          configuration:
            acks: all
            retries: 3
      bindings:
        templateEventSupplier-out-0:
          destination: template-events
          contentType: application/json
        templateEventConsumer-in-0:
          destination: template-events
          group: microservice-template-group
          contentType: application/json

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      prometheus:
        enabled: true

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    oauth2-redirect-url: /swagger-ui/oauth2-redirect.html

resilience4j:
  circuitbreaker:
    instances:
      externalService:
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
        permittedNumberOfCallsInHalfOpenState: 3
  retry:
    instances:
      externalService:
        maxAttempts: 3
        waitDuration: 500ms

logging:
  level:
    com.example.template: INFO
    org.springframework.security: WARN
