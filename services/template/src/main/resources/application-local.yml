spring:
  datasource:
    url: jdbc:postgresql://postgres-postgresql.payments.svc.cluster.local:5432/template
    username: template
    password: template123
    driver-class-name: org.postgresql.Driver
  redis:
    host: redis-master.payments.svc.cluster.local
    port: 6379
  security:
    oauth2:
      resourceserver:
        jwt:
          # Only jwk-set-uri (no issuer-uri) so tokens from both localhost and tunnel are accepted
          jwk-set-uri: http://keycloak.payments.svc.cluster.local:8080/auth/realms/template/protocol/openid-connect/certs
  cloud:
    stream:
      kafka:
        binder:
          brokers: kafka-kafka-bootstrap.payments.svc.cluster.local:9092

opensearch:
  host: opensearch-cluster-master.payments.svc.cluster.local
  port: 9200

aws:
  endpoint-override: http://localstack.payments.svc.cluster.local:4566
  region: us-east-1
  access-key: test
  secret-key: test
  s3:
    bucket: template-documents
  sqs:
    task-queue-url: http://localstack.payments.svc.cluster.local:4566/000000000000/template-tasks
